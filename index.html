<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blind Stick Vision Assistant</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:40px;
}

h1{
    color:#333;
}

button{
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

textarea{
    width:80%;
    height:200px;
    margin-top:20px;
    padding:10px;
    font-size:15px;
}
</style>
</head>

<body>

<h1>Blind Stick Vision Assistant</h1>

<button onclick="scan()">Scan Environment</button>
<button onclick="startListening()">Start Voice Assistant</button>

<br>

<textarea id="messages" placeholder="System messages will appear here..."></textarea>


<script>

const ESP32_URL = "http://10.46.43.197/capture"
const API_URL = "https://blindx.onrender.com/upload"

let recognition
let listening = false


function log(msg){
    const box = document.getElementById("messages")
    box.value += msg + "\n"
    box.scrollTop = box.scrollHeight
}


function speak(text){
    const speech = new SpeechSynthesisUtterance(text)
    speech.lang = "en-US"
    window.speechSynthesis.speak(speech)
}



async function captureImage(){

    try{

        const response = await fetch(ESP32_URL)

        const blob = await response.blob()
        console.log(blob)
        return blob

    }
    catch(error){

        log("Camera error: " + error)
        speak("Camera not reachable")

        throw error
    }

}



async function scan(){

    log("Scanning environment...")

    try{

        const imageBlob = await captureImage()

        const formData = new FormData()

        formData.append("image", imageBlob, "capture.jpg")
        formData.append("text","scan")

        const response = await fetch(API_URL,{
            method:"POST",
            body:formData
        })

        const data = await response.json()

        log("Result: " + data.result)

        speak(data.result)

    }
    catch(error){

        log("Scan failed")

    }

}



async function sendText(text){

    try{

        const response = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                text:text
            })
        })

        const data = await response.json()

        log("AI: " + data.result)

        speak(data.result)

    }
    catch(error){

        log("API error")
    }

}



async function sendImageAndText(text){

    try{

        const imageBlob = await captureImage()

        const formData = new FormData()

        formData.append("image", imageBlob,"capture.jpg")
        formData.append("text", text)

        const response = await fetch(API_URL,{
            method:"POST",
            body:formData
        })

        const data = await response.json()

        log("AI: " + data.result)

        speak(data.result)

    }
    catch(error){

        log("Error sending image + text")

    }

}



function startListening(){

    if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
        alert("Speech Recognition not supported")
        return
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

    recognition = new SpeechRecognition()

    recognition.continuous = true
    recognition.interimResults = false
    recognition.lang = "en-US"

    recognition.onstart = ()=>{
        listening = true
        log("Voice assistant started")
        speak("Voice assistant started")
    }

    recognition.onresult = async (event)=>{

        const transcript = event.results[event.results.length-1][0].transcript.toLowerCase()

        log("You said: " + transcript)


        if(transcript.includes("hello")){
            speak("Hello, how can I help you?")
            return
        }

        if(transcript.includes("time")){
            const now = new Date().toLocaleTimeString()
            speak("Current time is " + now)
            return
        }

        if(transcript.includes("stop")){
            recognition.stop()
            speak("Voice assistant stopped")
            return
        }


        if(transcript.includes("around")){

            await sendImageAndText(transcript)

        }
        else{

            await sendText(transcript)

        }

    }

    recognition.onerror = (event)=>{
        log("Speech error: " + event.error)
    }

    recognition.start()

}



</script>

</body>
</html>
